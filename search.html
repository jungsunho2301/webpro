<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>검색 결과</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">BookFinder</a>
        <form id="search-form" class="search-form">
            <input type="text" id="search-input" placeholder="책 제목, 저자 검색...">
            <button type="submit">검색 🔍</button>
        </form>
        <div class="nav-links">
            <a href="bookmark.html">Bookmark ★</a>
            <button id="theme-toggle">🌓</button>
        </div>
    </header>

    <main>
        <h2 id="result-title">검색 중...</h2>
        <div class="book-grid" id="search-results">
            </div>
    </main>

    <footer>Copyright 2026. 전공과목 프로젝트 | Kakao Open API</footer>
    <script src="app.js"></script>
    <script>
        // 검색 실행 로직
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('query');
            const resultTitle = document.getElementById('result-title');
            const resultGrid = document.getElementById('search-results');

            if (!query) {
                resultTitle.textContent = "검색어가 없습니다.";
                return;
            }

            // 상단 검색창에 현재 검색어 유지
            document.getElementById('search-input').value = query;
            resultTitle.textContent = `'${query}' 검색 결과`;

            try {
                // Kakao 도서 검색 API 호출
                const response = await fetch(`https://dapi.kakao.com/v3/search/book?query=${encodeURIComponent(query)}&size=12`, {
                    headers: { 'Authorization': `KakaoAK ${KAKAO_API_KEY}` }
                });
                
                const data = await response.json();

                if (data.documents.length === 0) {
                    resultGrid.innerHTML = "<p>검색 결과가 존재하지 않습니다.</p>";
                    return;
                }

                // 결과 렌더링
                resultGrid.innerHTML = "";
                data.documents.forEach(book => {
                    const card = createBookCard(book);
                    resultGrid.appendChild(card);
                });

            } catch (error) {
                console.error("API 호출 에러:", error);
                resultGrid.innerHTML = "<p>데이터를 불러오는 중 오류가 발생했습니다. API 키를 확인해주세요.</p>";
            }
        });
    </script>
</body>
</html>
